strategy_id: rsi2_mean_reversion
class: backend.strategies.rsi2_mean_reversion.strategy.Rsi2MeanReversionStrategy
enabled: true
symbols: [SPY, QQQ]
interval: 1d
allowed_regimes: [TREND_UP, RANGE]
opt_in_high_vol: false
risk_per_trade_pct: 0.5
validation_overrides:
  mtf_alignment:
    # RSI2 is a daily mean-reversion strategy. Requiring a rising 1h EMA is
    # a lower-timeframe trend check and vetoes the very pullbacks it targets.
    # Its own daily EMA(200) condition remains the trend guard.
    skip: true
  volume_confirmation:
    skip: true      # mean-reversion entries legitimately fire on volume dry-ups
parameters:
  rsi_period: 2
  entry_rsi_below: 10
  exit_rsi_above: 65
  trend_ema_period: 200
  time_stop_bars: 5
